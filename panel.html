<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Panel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--surface:#131318;--surface2:#1a1a22;--border:#252530;
  --accent:#4a9eff;--ok:#3ecf8e;--err:#ff4455;--warn:#f0a000;--purple:#c084fc;
  --text:#e0e0ea;--dim:#555568;--mid:#8888a0;
  --mono:"Cascadia Code","Fira Code","Consolas",monospace;
  --img-h:35%;--sys-h:18%;--usr-h:18%;--reply-h:auto;
  --img-split:50%;
  --paper-w:380px;
  --wave-r:8px
}
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:12px;height:100vh;display:flex;flex-direction:column;overflow:hidden;color-scheme:dark}

#topbar{display:flex;align-items:center;gap:12px;padding:6px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
#topbar-title{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:.12em;text-transform:uppercase}
#block-count{font-size:10px;color:var(--mid)}
#dot{width:7px;height:7px;border-radius:50%;background:var(--err);flex-shrink:0;margin-left:auto}
#dot.live{background:var(--ok)}

#grid{display:flex;flex:1;min-height:0;gap:0;overflow-x:auto;overflow-y:hidden;padding:8px 8px 0 8px}

.paper{
  flex:0 0 var(--paper-w);
  display:flex;flex-direction:column;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--wave-r);
  overflow:hidden;
  margin:0 4px 8px 4px;
  position:relative;
  height:calc(100vh - 70px)
}
.paper::before,.paper::after{
  content:"";position:absolute;left:0;right:0;height:6px;z-index:2;pointer-events:none
}
.paper::before{
  top:-1px;
  background:repeating-conic-gradient(var(--surface) 0% 25%,transparent 0% 50%) 0 0/12px 6px;
  mask:linear-gradient(to bottom,#000 60%,transparent)
}
.paper::after{
  bottom:-1px;
  background:repeating-conic-gradient(var(--surface) 0% 25%,transparent 0% 50%) 0 0/12px 6px;
  mask:linear-gradient(to top,#000 60%,transparent)
}

.paper-head{
  display:flex;align-items:center;gap:6px;padding:5px 10px;
  background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:1
}
.paper-agent{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:8px}
.paper-ts{font-size:9px;color:var(--dim);margin-left:auto}

.row-images{
  display:flex;flex-shrink:0;overflow:hidden;position:relative;
  height:var(--img-h);min-height:40px;background:var(--bg)
}
.img-half{
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;background:var(--bg);min-width:0;padding:2px
}
.img-half:first-child{flex:0 0 var(--img-split);border-right:1px solid var(--border)}
.img-half:last-child{flex:1}
.img-half img{max-width:100%;max-height:100%;object-fit:contain;display:none}
.img-half .tag{
  position:absolute;top:2px;left:4px;font-size:7px;color:var(--dim);
  text-transform:uppercase;letter-spacing:.08em;pointer-events:none;z-index:1
}
.img-half .ph{color:var(--border);font-size:9px}

.drag-h{
  height:5px;cursor:ns-resize;background:var(--border);flex-shrink:0;z-index:3;
  transition:background .15s
}
.drag-h:hover{background:var(--accent)}

.drag-v{
  position:absolute;width:9px;cursor:col-resize;z-index:4;
  top:0;bottom:0;background:transparent
}
.drag-v:hover{background:rgba(74,158,255,0.2)}
.drag-point{
  position:absolute;width:13px;height:13px;border-radius:50%;
  background:var(--accent);border:2px solid var(--bg);
  cursor:move;z-index:5;transform:translate(-50%,-50%);
  opacity:0;transition:opacity .2s
}
.paper:hover .drag-point{opacity:1}

.row-sys,.row-usr,.row-reply{
  flex-shrink:0;overflow:auto;padding:4px 10px;font-size:9px;line-height:1.45;
  white-space:pre-wrap;word-break:break-word;border-bottom:1px solid var(--border)
}
.row-sys{color:#a78bfa;background:rgba(167,139,250,0.04);height:var(--sys-h);min-height:20px}
.row-sys::before{content:"1 SYS ";color:#7c3aed;font-weight:700}
.row-usr{color:#60a5fa;background:rgba(96,165,250,0.04);height:var(--usr-h);min-height:20px}
.row-usr::before{content:"2 USR ";color:#2563eb;font-weight:700}
.row-reply{color:#34d399;background:rgba(52,211,153,0.04);flex:1;min-height:20px}
.row-reply::before{content:"3 VLM ";color:#059669;font-weight:700}
.row-sys .ph,.row-usr .ph,.row-reply .ph{color:var(--border);font-weight:normal}

#notif-bar{
  flex-shrink:0;display:flex;gap:1px;overflow-x:auto;overflow-y:hidden;
  background:var(--border);border-top:1px solid var(--border);min-height:0;max-height:24px
}
.notif{
  background:var(--surface2);padding:3px 10px;font-size:8px;
  color:var(--dim);display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0
}
.notif .ndot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.notif .ndot.ok{background:var(--ok)}
.notif .ndot.err{background:var(--err)}
.notif .ndot.warn{background:var(--warn)}
.notif .nagent{font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.notif .nts{color:var(--border)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="topbar">
  <span id="topbar-title">Panel</span>
  <span id="block-count">0 agents</span>
  <div id="dot"></div>
</div>
<div id="grid"></div>
<div id="notif-bar"></div>

<script type="module">
const IS_FILE = location.protocol === 'file:';
const PANEL = IS_FILE ? 'http://127.0.0.1:1236' : '';
const SENTINEL = 'NONE';
const grid = document.getElementById('grid');
const dot = document.getElementById('dot');
const countEl = document.getElementById('block-count');
const notifBar = document.getElementById('notif-bar');
const COLORS = ['#4a9eff','#3ecf8e','#f0a000','#c084fc','#ff4455','#06b6d4','#f97316','#a3e635'];
const colorMap = new Map();
let colorIdx = 0;
let agentTotal = 0;
let masterPaper = null;
const agents = new Map();

function plog(level, msg, extra) {
  const e = {level, msg, ts: Date.now()};
  if (extra) e.extra = extra;
  try { fetch(`${PANEL}/panel-log`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(e)}); } catch {}
}

function agentColor(n) {
  if (!colorMap.has(n)) colorMap.set(n, COLORS[(colorIdx++) % COLORS.length]);
  return colorMap.get(n);
}

function hexRgba(h, a) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function tsNow() {
  const d = new Date();
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}.${d.getMilliseconds().toString().padStart(3,'0')}`;
}

function showImg(imgEl, phEl, b64) {
  imgEl.style.display = 'block';
  phEl.style.display = 'none';
  imgEl.src = `data:image/png;base64,${b64}`;
}

function scrollEnd(el) {
  el.scrollTop = el.scrollHeight;
}

function setRow(row, text) {
  if (text && text !== SENTINEL) {
    row.textContent = '';
    row.textContent = text;
  } else {
    row.textContent = '';
    const ph = document.createElement('span');
    ph.className = 'ph';
    ph.textContent = '\u2014';
    row.appendChild(ph);
  }
  scrollEnd(row);
}

function applyMasterSizes() {
  if (!masterPaper) return;
  const root = document.documentElement.style;
  root.setProperty('--img-h', masterPaper._imgH + 'px');
  root.setProperty('--sys-h', masterPaper._sysH + 'px');
  root.setProperty('--usr-h', masterPaper._usrH + 'px');
  root.setProperty('--img-split', masterPaper._imgSplit + '%');
}

function createPaper(agent) {
  const color = agentColor(agent);
  const paper = document.createElement('div');
  paper.className = 'paper';
  agentTotal++;

  const head = document.createElement('div');
  head.className = 'paper-head';
  const pill = document.createElement('span');
  pill.className = 'paper-agent';
  pill.style.background = hexRgba(color, 0.15);
  pill.style.color = color;
  pill.textContent = agent;
  const tsEl = document.createElement('span');
  tsEl.className = 'paper-ts';
  tsEl.textContent = tsNow();
  head.append(pill, tsEl);

  const rowImg = document.createElement('div');
  rowImg.className = 'row-images';
  const leftH = document.createElement('div');
  leftH.className = 'img-half';
  const leftTag = document.createElement('span');
  leftTag.className = 'tag';
  leftTag.textContent = '1 RAW';
  const leftImg = document.createElement('img');
  leftImg.alt = '';
  const leftPh = document.createElement('span');
  leftPh.className = 'ph';
  leftPh.textContent = 'no capture';
  leftH.append(leftTag, leftImg, leftPh);

  const rightH = document.createElement('div');
  rightH.className = 'img-half';
  const rightTag = document.createElement('span');
  rightTag.className = 'tag';
  rightTag.textContent = '2 VLM IMG';
  const rightImg = document.createElement('img');
  rightImg.alt = '';
  const rightPh = document.createElement('span');
  rightPh.className = 'ph';
  rightPh.textContent = 'pending';
  rightH.append(rightTag, rightImg, rightPh);
  rowImg.append(leftH, rightH);

  const drag1 = document.createElement('div');
  drag1.className = 'drag-h';
  drag1.dataset.edge = 'img';

  const rowSys = document.createElement('div');
  rowSys.className = 'row-sys';
  const sysPh = document.createElement('span');
  sysPh.className = 'ph';
  sysPh.textContent = '\u2014';
  rowSys.appendChild(sysPh);

  const drag2 = document.createElement('div');
  drag2.className = 'drag-h';
  drag2.dataset.edge = 'sys';

  const rowUsr = document.createElement('div');
  rowUsr.className = 'row-usr';
  const usrPh = document.createElement('span');
  usrPh.className = 'ph';
  usrPh.textContent = '\u2014';
  rowUsr.appendChild(usrPh);

  const drag3 = document.createElement('div');
  drag3.className = 'drag-h';
  drag3.dataset.edge = 'usr';

  const rowReply = document.createElement('div');
  rowReply.className = 'row-reply';
  const replyPh = document.createElement('span');
  replyPh.className = 'ph';
  replyPh.textContent = '\u2014';
  rowReply.appendChild(replyPh);

  paper.append(head, rowImg, drag1, rowSys, drag2, rowUsr, drag3, rowReply);
  grid.appendChild(paper);

  const refs = {
    paper, leftImg, leftPh, rightImg, rightPh,
    rowSys, rowUsr, rowReply, tsEl, rowImg,
    drag1, drag2, drag3
  };

  if (!masterPaper) {
    masterPaper = paper;
    paper._imgH = rowImg.offsetHeight || 200;
    paper._sysH = 100;
    paper._usrH = 100;
    paper._imgSplit = 50;
    setupMasterDrag(paper, refs);
  }

  countEl.textContent = `${agentTotal} agent${agentTotal === 1 ? '' : 's'}`;
  return refs;
}

function setupMasterDrag(paper, refs) {
  let activeEdge = null;
  let startY = 0;
  let startVal = 0;

  function onMouseDown(e) {
    e.preventDefault();
    const edge = e.target.dataset.edge;
    if (!edge) return;
    activeEdge = edge;
    startY = e.clientY;
    if (edge === 'img') startVal = paper._imgH;
    else if (edge === 'sys') startVal = paper._sysH;
    else if (edge === 'usr') startVal = paper._usrH;
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
  }

  function onMouseMove(e) {
    const dy = e.clientY - startY;
    const nv = Math.max(30, startVal + dy);
    if (activeEdge === 'img') paper._imgH = nv;
    else if (activeEdge === 'sys') paper._sysH = nv;
    else if (activeEdge === 'usr') paper._usrH = nv;
    applyMasterSizes();
  }

  function onMouseUp() {
    activeEdge = null;
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  }

  refs.drag1.addEventListener('mousedown', onMouseDown);
  refs.drag2.addEventListener('mousedown', onMouseDown);
  refs.drag3.addEventListener('mousedown', onMouseDown);

  let splitDragging = false;
  let splitStartX = 0;
  let splitStartVal = 0;

  refs.rowImg.addEventListener('mousedown', (e) => {
    const rect = refs.rowImg.getBoundingClientRect();
    const splitX = rect.left + rect.width * (paper._imgSplit / 100);
    if (Math.abs(e.clientX - splitX) < 8) {
      e.preventDefault();
      splitDragging = true;
      splitStartX = e.clientX;
      splitStartVal = paper._imgSplit;
      document.addEventListener('mousemove', onSplitMove);
      document.addEventListener('mouseup', onSplitUp);
    }
  });

  function onSplitMove(e) {
    if (!splitDragging) return;
    const rect = refs.rowImg.getBoundingClientRect();
    const pct = Math.max(10, Math.min(90, ((e.clientX - rect.left) / rect.width) * 100));
    paper._imgSplit = pct;
    applyMasterSizes();
  }

  function onSplitUp() {
    splitDragging = false;
    document.removeEventListener('mousemove', onSplitMove);
    document.removeEventListener('mouseup', onSplitUp);
  }

  applyMasterSizes();
}

function getOrCreate(agent) {
  if (agents.has(agent)) return agents.get(agent);
  const refs = createPaper(agent);
  agents.set(agent, refs);
  return refs;
}

function updateFromState(d) {
  const agent = d.agent;
  if (!agent || agent === SENTINEL) return;
  const b = getOrCreate(agent);
  b.tsEl.textContent = tsNow();

  if (d.raw_image_b64 && d.raw_image_b64 !== SENTINEL) {
    showImg(b.leftImg, b.leftPh, d.raw_image_b64);
  }

  if (d.vlm_image_b64 && d.vlm_image_b64 !== SENTINEL) {
    showImg(b.rightImg, b.rightPh, d.vlm_image_b64);
  }

  setRow(b.rowSys, d.system_prompt);
  setRow(b.rowUsr, d.user_message);
  setRow(b.rowReply, d.vlm_reply);
}

function createNotif(agent, text, level) {
  const n = document.createElement('div');
  n.className = 'notif';
  const nd = document.createElement('span');
  nd.className = `ndot ${level}`;
  const na = document.createElement('span');
  na.className = 'nagent';
  na.textContent = agent;
  const nt = document.createElement('span');
  nt.textContent = text;
  const nts = document.createElement('span');
  nts.className = 'nts';
  nts.textContent = tsNow();
  n.append(nd, na, nt, nts);
  notifBar.appendChild(n);
  notifBar.scrollLeft = notifBar.scrollWidth;
}

async function postResult(requestId, imageB64) {
  try {
    await fetch(`${PANEL}/result`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({request_id: requestId, image_b64: imageB64})});
  } catch (err) {
    plog('error', 'result_post_failed', {request_id: requestId, error: String(err)});
  }
}

const drawPolygonOn = (ctx, ov, w, h) => {
  const N = 1000;
  const pts = (ov.points||[]).map(p=>[(p[0]||0)*w/N,(p[1]||0)*h/N]);
  if (pts.length < 2) return;
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  if (ov.closed) ctx.closePath();
  if (ov.fill){ctx.fillStyle=ov.fill;ctx.fill();}
  if (ov.stroke){ctx.strokeStyle=ov.stroke;ctx.lineWidth=ov.stroke_width||1;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();}
  if (ov.label && pts.length > 0) {
    let cx = 0, cy = 0;
    for (const p of pts) { cx += p[0]; cy += p[1]; }
    cx /= pts.length; cy /= pts.length;
    const fontSize = Math.max(10, Math.min(w, h) * 0.025);
    ctx.font = `bold ${fontSize}px system-ui,sans-serif`;
    const metrics = ctx.measureText(ov.label);
    const tw = metrics.width;
    const th = fontSize;
    const pad = 3;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(cx - tw/2 - pad, cy - th/2 - pad, tw + pad*2, th + pad*2);
    ctx.fillStyle = ov.stroke || '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ov.label, cx, cy);
  }
};

const renderAnnotated = async (raw_b64, overlays) => {
  const img = await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=`data:image/png;base64,${raw_b64}`;});
  const oc = new OffscreenCanvas(img.naturalWidth, img.naturalHeight);
  const ctx = oc.getContext('2d');
  ctx.drawImage(img,0,0);
  for (const ov of overlays) drawPolygonOn(ctx, ov, img.naturalWidth, img.naturalHeight);
  const blob = await oc.convertToBlob({type:'image/png'});
  const buf = await blob.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
};

const es = new EventSource(`${PANEL}/agent-events?agent=ui`);
es.addEventListener('connected', () => { dot.className = 'live'; plog('info', 'sse_connected'); });
es.onerror = () => { dot.className = ''; plog('warn', 'sse_error'); };

es.addEventListener('agent_state', e => {
  let d;
  try { d = JSON.parse(e.data); } catch (err) { plog('error', 'agent_state_parse', {error: String(err)}); return; }
  updateFromState(d);
});

es.addEventListener('annotate', async e => {
  let d;
  try { d = JSON.parse(e.data); } catch (err) { plog('error', 'annotate_json_parse_failed', {error: String(err)}); return; }

  if (d.image_b64 !== SENTINEL) {
    if ((d.overlays||[]).length > 0) {
      try {
        const annotated_b64 = await renderAnnotated(d.image_b64, d.overlays);
        await postResult(d.request_id, annotated_b64);
      } catch (err) {
        plog('error', 'annotate_render_failed', {request_id: d.request_id, error: String(err)});
      }
    } else {
      await postResult(d.request_id, d.image_b64);
    }
  } else {
    await postResult(d.request_id, SENTINEL);
  }
});

es.addEventListener('message', e => {
  let d;
  try { d = JSON.parse(e.data); } catch { return; }
  const sender = d.sender || 'unknown';
  const eventType = d.event_type || 'unknown';
  if (eventType === 'status') { createNotif(sender, d.status || '', 'ok'); return; }
  if (eventType === 'error') { createNotif(sender, d.text || 'error', 'err'); return; }
  createNotif(sender, `${eventType}: ${d.text || d.status || ''}`, 'warn');
});
</script>
</body>
</html>
